<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Maths Simulator</title>
  <link rel="stylesheet" href="businessmathscss.css">
</head>
<body>
<h1 class="page-title">Business Maths Simulator</h1>
<div class="main-container">  
<div class="left-div" style="flex: 7;">
<div class="container">
  <h2>PROFIT & LOSS CALCULATOR</h2>
  <div class="calculator-section">
    <div class="input-group">
      <label for="costPrice">Cost Price <input type="number" id="costPrice" placeholder="Enter Cost Price"></label>
      <label for="sellingPrice">Selling Price <input type="number" id="sellingPrice" placeholder="Enter Selling Price"></label>
      <label for="marketPrice">Market Price <input type="number" id="marketPrice" placeholder="Enter Market Price"></label>
      <label for="quantity">Quantity <input type="number" id="quantity" placeholder="Enter Quantity" value="1" min="1"></label>
    </div>
    <div class="input-group">
      <label for="profitAmount">Profit Amount <input type="number" id="profitAmount" placeholder="Profit Amount"></label>
      <label for="profitPercentage">Profit Percentage <input type="number" id="profitPercentage" placeholder="Profit Percentage"></label>
      <label for="lossAmount">Loss Amount <input type="number" id="lossAmount" placeholder="Loss Amount"></label>
      <label for="lossPercentage">Loss Percentage <input type="number" id="lossPercentage" placeholder="Loss Percentage"></label>
    </div>
  </div>
  <div class="button-container">
      <button id="calculateBtn">Calculate</button>
      <button id="ratioBtn">Calculate Ratio</button>
      <button id="clearBtn">Clear All</button>
      <div class="result-container" id="result">Profit/Loss result will appear here</div>
  </div>
  
  <br><br>
  
<h2>INTEREST CALCULATOR</h2>
  <div class="interest-grid">
    <div class="interest-row">
      <div class="interest-row-item">
        <label for="principal">Principal Amount:</label>
        <input type="number" id="principal" placeholder="Enter principal amount">
      </div>
      <div class="interest-row-item">
        <label for="rate">Rate of Interest (%):</label>
        <input type="number" id="rate" placeholder="Enter rate">
      </div>
      <div class="interest-row-item">
        <label for="time">Time (in years):</label>
        <input type="number" id="time" placeholder="Enter time">
      </div>
    </div>
    <div class="interest-row">
      <div class="interest-row-item">
        <label for="simpleInterest">Simple Interest:</label>
        <input type="number" id="simpleInterest" placeholder="Enter Simple Interest">
      </div>
      <div class="interest-row-item">
        <label for="compoundInterest">Compound Interest:</label>
        <input type="number" id="compoundInterest" placeholder="Enter Compound Interest">
      </div>
    </div>
  </div>  
<div class="button-container">
    <button onclick="updateInterest()">Calculate Interest</button>
    <div class="result-container" id="interestResult">Interest result will appear here</div>
  </div>
</div>
</div>
<div class="right-div">
  <div class="calculatorbody">
  <input type="text" id="calcDisplay" placeholder="0" readonly style="width:100%; padding:10px; font-size:18px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc; box-sizing:border-box;">
  <div id="calcButtons" style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px;">
    <button onclick="appendFunction('Math.pow(')">x^y</button><button onclick="appendFunction('Math.sqrt(')">√</button>
    <button onclick="clearDisplay()">C</button><button onclick="deleteLast()">DEL</button><button onclick="appendFunction('Math.log(')">ln</button>
    <button onclick="appendFunction('Math.sin(')">sin</button><button onclick="appendFunction('Math.cos(')">cos</button><button onclick="appendFunction('Math.tan(')">tan</button>
    <button onclick="appendValue('7')">7</button><button onclick="appendValue('8')">8</button><button onclick="appendValue('9')">9</button>
    <button onclick="appendValue('/')">÷</button>
    <button onclick="appendValue('4')">4</button><button onclick="appendValue('5')">5</button><button onclick="appendValue('6')">6</button>
    <button onclick="appendValue('*')">×</button>
    <button onclick="appendValue('1')">1</button><button onclick="appendValue('2')">2</button><button onclick="appendValue('3')">3</button>
    <button onclick="appendValue('-')">-</button>
    <button onclick="appendValue('0')">0</button>
    <button onclick="appendValue('.')">.</button><button onclick="calculateResult()">=</button><button onclick="appendValue('+')">+</button>
  </div>
  </div>
</div>
</div>
<script>
  const display = document.getElementById('calcDisplay');
  function appendValue(val){ display.value += val; }
  function appendFunction(func){ display.value += func; }
  function clearDisplay(){ display.value = ''; }
  function deleteLast(){ display.value = display.value.slice(0,-1); }
  function calculateResult(){
    try { display.value = eval(display.value); } 
    catch(e){ display.value = 'Error'; }
  }
</script>
  <script src="businessmathsjs.js"></script>
</body>
</html>
